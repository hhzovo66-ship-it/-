<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>母亲节 · 致妈妈</title>
  <!-- GSAP 动画库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
  </script>
  <!-- Google 艺术字体：马山正 -->
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', '宋体', serif;
      background: radial-gradient(ellipse at center, #fff0f5 0%, #fce4ec 100%);
      touch-action: manipulation;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      user-select: none;
    }

    /* ---------- 飘落花瓣背景层 ---------- */
    .petals-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .petal {
      position: absolute;
      width: 30px;
      height: 30px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path d="M16 2C16 2 4 12 4 18c0 6.6 5.4 12 12 12s12-5.4 12-12C28 12 16 2 16 2z" fill="%23ffb7c5" opacity="0.8"/></svg>') no-repeat center;
      background-size: contain;
      animation: fall linear infinite;
      opacity: 0.7;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* ---------- 金粉粒子（点击信封时触发） ---------- */
    .sparkle {
      position: fixed;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #f9e076, #c9983b);
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 0 6px gold;
    }

    /* ---------- 主舞台 ---------- */
    .stage {
      width: min(92vw, 420px);
      height: min(85vh, 620px);
      position: relative;
      z-index: 10;
      perspective: 1200px;
    }

    /* ---------- 信封 ---------- */
    .envelope {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
      z-index: 20;
    }

    .envelope-body {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #f8e1e7 0%, #f0c4d3 100%);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(180, 100, 120, 0.25), inset 0 2px 4px rgba(255, 255, 255, 0.8);
      position: absolute;
      top: 0;
      left: 0;
      overflow: hidden;
      border: 2px solid rgba(212, 163, 115, 0.3);
    }

    /* 信封花纹装饰 */
    .envelope-body::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 2px dashed #d4a373;
      border-radius: 12px;
      opacity: 0.35;
      pointer-events: none;
    }

    .envelope-body::after {
      content: "";
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c97b84, transparent);
      opacity: 0.5;
    }

    .envelope-front {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .greeting-text {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 3.2rem;
      color: #b57b6e;
      text-shadow: 1px 1px 3px white;
      margin-bottom: 25px;
      letter-spacing: 6px;
    }

    .wax-seal {
      width: 85px;
      height: 85px;
      background: radial-gradient(circle at 40% 40%, #f7d1d0, #c97b84);
      border-radius: 50%;
      box-shadow: 0 8px 18px rgba(160, 80, 100, 0.5), inset 0 -5px 10px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      z-index: 5;
    }

    .wax-seal:hover {
      transform: scale(1.06);
      box-shadow: 0 10px 22px rgba(160, 80, 100, 0.7);
    }
    .wax-seal:active {
      transform: scale(0.95);
    }

    .wax-seal span {
      font-size: 40px;
      color: white;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .hint {
      position: absolute;
      bottom: 35px;
      font-size: 0.9rem;
      color: #b57b6e;
      letter-spacing: 3px;
      animation: pulse 1.8s infinite;
      font-family: 'Ma Shan Zheng', cursive;
    }

    @keyframes pulse {
      0% { opacity: 0.4; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-3px); }
      100% { opacity: 0.4; transform: translateY(0); }
    }

    /* ---------- 信纸本（翻页容器） ---------- */
    .letter-book {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      z-index: 15;
      background: transparent;
      border-radius: 20px;
      overflow: hidden;
      transition: opacity 0.5s ease;
    }

    .letter-book.active {
      opacity: 1;
      pointer-events: auto;
    }

    .pages-container {
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      display: flex;
      flex-direction: column;
    }

    .page {
      min-width: 100%;
      min-height: 100%;
      background-color: #fffef7;
      /* 信纸横线：每 2.2rem 一根，通过 background-position 微调让线对齐到文字底部 */
      background-image: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 1.1rem,
        #e6c9a8 1.1rem,
        #e6c9a8 1.12rem
      );
      background-position: 0 0.35rem;
      box-shadow: inset 0 0 30px rgba(200, 160, 120, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 25px;
      border-radius: 20px;
      border: 1px solid rgba(212, 163, 115, 0.3);
      position: relative;
    }

    /* 页面装饰边框 */
    .page::before {
      content: "";
      position: absolute;
      inset: 15px;
      border: 2px solid #e6c9a8;
      border-radius: 12px;
      pointer-events: none;
      opacity: 0.6;
    }

    .page-text {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 2rem;
      color: #6b4c3b;
      line-height: 2.2rem;
      letter-spacing: 4px;
      text-align: center;
      max-width: 90%;
    }

    .page-sub {
      font-family: 'Ma Shan Zheng', cursive;
      font-size: 1.6rem;
      color: #b57b6e;
      margin-top: 15px;
      letter-spacing: 3px;
    }

    /* 翻页按钮 */
    .nav-buttons {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      box-sizing: border-box;
      z-index: 30;
      pointer-events: none;
    }

    .nav-btn {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid #d4a373;
      color: #b57b6e;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      font-family: serif;
    }

    .nav-btn:active {
      transform: scale(0.92);
      background: #f8e1e7;
    }

    .nav-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* 最后一页的大图标 */
    .big-heart {
      font-size: 4rem;
      margin-top: 20px;
    }

    /* ---------- 响应式调整 ---------- */
    @media (max-width: 400px) {
      .greeting-text { font-size: 2.5rem; }
      .page-text { font-size: 1.8rem; letter-spacing: 2px; }
      .page-sub { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<!-- 飘落花瓣 -->
<div class="petals-container" id="petalsContainer"></div>

<!-- 主舞台 -->
<div class="stage" id="stage">
  <!-- 信封 -->
  <div class="envelope" id="envelope">
    <div class="envelope-body">
      <div class="envelope-front" id="envelopeFront">
        <div class="greeting-text">致 亲爱的妈妈</div>
        <div class="wax-seal" id="seal" tabindex="0" role="button" aria-label="打开信封">
          <span>❤️</span>
        </div>
        <div class="hint">轻点心形 · 拆开信封</div>
      </div>
    </div>
  </div>

  <!-- 信纸本（多页可翻） -->
  <div class="letter-book" id="letterBook">
    <div class="pages-container" id="pagesContainer">
      <!-- 第 1 页 -->
      <div class="page">
        <div class="page-text">棘心夭夭，母氏劬劳</div>
        <div class="page-sub">寻常一样窗前月，才有梅花便不同</div>
      </div>
      <!-- 第 2 页（长句已加换行） -->
      <div class="page">
        <div class="page-text">五月微凉的风里，<br>有栀子花的白和你年轻时的背影</div>
        <div class="page-sub">我在远方，一切安好</div>
      </div>
      <!-- 第 3 页（最后一页） -->
      <div class="page">
        <div class="page-text">母亲节快乐</div>
        <div class="big-heart">👩</div>
        <div class="page-sub">愿岁月温柔待您</div>
      </div>
    </div>

    <!-- 翻页按钮 -->
    <div class="nav-buttons" id="navButtons">
      <div class="nav-btn prev-btn disabled" id="prevBtn">▲</div>
      <div class="nav-btn next-btn" id="nextBtn">▼</div>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- 花瓣 ----------
    const petalsContainer = document.getElementById('petalsContainer');
    function createPetal() {
      const petal = document.createElement('div');
      petal.classList.add('petal');
      const size = Math.random() * 20 + 15;
      petal.style.width = size + 'px';
      petal.style.height = size + 'px';
      petal.style.left = Math.random() * 100 + '%';
      petal.style.animationDuration = Math.random() * 8 + 6 + 's';
      petal.style.animationDelay = Math.random() * 5 + 's';
      petalsContainer.appendChild(petal);
      petal.addEventListener('animationend', () => {
        petal.remove();
        createPetal();
      });
    }
    for (let i = 0; i < 25; i++) createPetal();

    // ---------- 金粉粒子生成器 ----------
    function spawnSparkles(x, y, count = 30) {
      for (let i = 0; i < count; i++) {
        const spark = document.createElement('div');
        spark.classList.add('sparkle');
        document.body.appendChild(spark);
        const angle = Math.random() * Math.PI * 2;
        const distance = 40 + Math.random() * 100;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;
        gsap.fromTo(spark, {
          x: x, y: y, scale: 1, opacity: 1
        }, {
          x: x + dx,
          y: y + dy,
          scale: 0,
          opacity: 0,
          duration: 1 + Math.random() * 0.8,
          ease: 'power2.out',
          onComplete: () => spark.remove()
        });
      }
    }

    // ---------- 翻页逻辑 ----------
    const pagesContainer = document.getElementById('pagesContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const totalPages = 3;
    let currentPage = 0;

    function updateButtons() {
      prevBtn.classList.toggle('disabled', currentPage === 0);
      nextBtn.classList.toggle('disabled', currentPage === totalPages - 1);
    }

    function goToPage(index) {
      if (index < 0 || index >= totalPages) return;
      currentPage = index;
      pagesContainer.style.transform = `translateY(-${currentPage * 100}%)`;
      updateButtons();
    }

    prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
    nextBtn.addEventListener('click', () => goToPage(currentPage + 1));

    // 触摸滑动翻页
    let touchStartY = 0;
    pagesContainer.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    pagesContainer.addEventListener('touchend', (e) => {
      const diff = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(diff) > 40) {
        if (diff > 0 && currentPage < totalPages - 1) {
          goToPage(currentPage + 1);
        } else if (diff < 0 && currentPage > 0) {
          goToPage(currentPage - 1);
        }
      }
    });

    // ---------- 信封点击打开动画 ----------
    const seal = document.getElementById('seal');
    const envelopeFront = document.getElementById('envelopeFront');
    const envelope = document.getElementById('envelope');
    const letterBook = document.getElementById('letterBook');

    seal.addEventListener('click', () => {
      const rect = seal.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      spawnSparkles(centerX, centerY, 40);

      gsap.to(seal, {
        scale: 0, opacity: 0, duration: 0.4, ease: 'power2.in',
        onComplete: () => { seal.style.display = 'none'; }
      });

      gsap.to(envelopeFront, { opacity: 0, duration: 0.6, delay: 0.2 });

      gsap.to(envelope, {
        y: -30,
        scale: 0.95,
        opacity: 0,
        duration: 0.8,
        delay: 0.4,
        ease: 'power2.in'
      });

      letterBook.classList.add('active');
      goToPage(0);
      gsap.fromTo(letterBook,
        { opacity: 0, y: 40 },
        { opacity: 1, y: 0, duration: 0.8, delay: 0.5, ease: 'power2.out' }
      );
    });

    seal.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        seal.click();
      }
    });

    updateButtons();
  })();
</script>
</body>
</html>
